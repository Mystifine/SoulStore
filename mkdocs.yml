site_name: SoulStore Documentation
repo_url: https://github.com/mystifine/SoulStore
repo_name: mystifine/SoulStore
theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - attr_list
  - def_list
  - tables

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - API Reference:
      - Types: api/types.md
      - Soul Methods: api/soul.md
      - SoulStore Methods: api/soulstore.md
  - Guides:
      - Session Locking: guides/session-locking.md
      - Data Operations: guides/data-operations.md
      - Lifecycle Hooks: guides/lifecycle-hooks.md
      - Change Listeners: guides/listeners.md
      - Resetting Data: guides/reset-data.md